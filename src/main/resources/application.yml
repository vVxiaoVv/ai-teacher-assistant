server:
  port: 8080

spring:
  application:
    name: ai-teacher-assistant

  servlet:
    multipart:
      max-file-size: 512MB
      max-request-size: 512MB

  datasource:
    url: jdbc:mysql://localhost:3306/ai_teacher?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
        format_sql: true

logging:
  level:
    root: INFO
    org.springframework.web: INFO
    org.hibernate: INFO

jwt:
  secret: ai-teacher-assistant-secret-key-2025-please-change-in-production
  expire: 604800  # 7天，单位：秒

# 语音识别服务配置
speech:
  service:
    url: ws://speech-internal.tal.com/v1/ws
    api-key: ${SPEECH_API_KEY:300000775:568f52f31bf0782018145f7dc56c3afb}


